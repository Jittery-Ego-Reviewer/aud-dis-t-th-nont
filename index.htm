<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unicorn Speech Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            overflow: hidden;
            touch-action: none;
            background: linear-gradient(135deg, #ffc3a0 0%, #ffafbd 100%);
        }
        
        /* Floating Background Emojis */
        .bg-emoji {
            position: absolute;
            font-size: 3rem;
            opacity: 0.3;
            animation: float 10s infinite ease-in-out;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        
        /* UI Layers */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            transition: opacity 0.3s;
        }
        .hidden {
            display: none !important;
        }

        /* Animations */
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .animate-shake { animation: shake 0.3s ease-in-out; }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            z-index: 5;
        }
        
        /* HUD */
        #hud {
            position: absolute;
            top: 10px; left: 10px; right: 10px;
            display: flex;
            justify-content: space-between;
            z-index: 6;
            pointer-events: none;
        }
        .hud-box {
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-weight: 900;
            color: #ff6b6b;
            font-size: 1.2rem;
            border: 3px solid white;
        }

        .btn {
            transition: all 0.2s;
            box-shadow: 0 6px 0 rgba(0,0,0,0.15);
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

    <!-- Decorative Background -->
    <div class="bg-emoji" style="top: 10%; left: 10%; animation-delay: 0s;">🦄</div>
    <div class="bg-emoji" style="top: 20%; right: 15%; animation-delay: 1s;">✨</div>
    <div class="bg-emoji" style="bottom: 15%; left: 20%; animation-delay: 2s;">🌈</div>
    <div class="bg-emoji" style="bottom: 25%; right: 10%; animation-delay: 3s;">🦄</div>
    <div class="bg-emoji" style="top: 50%; left: 5%; animation-delay: 1.5s;">🍬</div>
    <div class="bg-emoji" style="top: 60%; right: 5%; animation-delay: 2.5s;">🎈</div>

    <!-- Start Screen -->
    <div id="start-screen" class="screen">
        <div class="bg-white/90 p-8 rounded-3xl shadow-xl text-center max-w-lg w-11/12 animate-pop border-4 border-pink-300">
            <h1 class="text-4xl md:text-5xl font-black text-pink-500 mb-2 drop-shadow-sm">聲母辨認大冒險 🦄</h1>
            <p class="text-gray-600 mb-8 font-bold text-lg">接禮物，考考你對耳仔！</p>
            
            <h2 class="text-xl font-bold text-indigo-500 mb-4">請選擇遊戲：</h2>
            <div class="flex flex-col gap-4">
                <button onclick="selectLevel(0)" class="btn bg-gradient-to-r from-pink-400 to-rose-400 text-white py-3 px-6 rounded-2xl text-xl font-bold border-2 border-white">
                    一：/k-/ 家 對 /t-/ 打
                </button>
                <button onclick="selectLevel(1)" class="btn bg-gradient-to-r from-purple-400 to-indigo-400 text-white py-3 px-6 rounded-2xl text-xl font-bold border-2 border-white">
                    二：/t-/ 打 對 /th-/ 他
                </button>
                <button onclick="selectLevel(2)" class="btn bg-gradient-to-r from-blue-400 to-cyan-400 text-white py-3 px-6 rounded-2xl text-xl font-bold border-2 border-white">
                    三：/t-/ 打 對 隨機字
                </button>
            </div>
        </div>
    </div>

    <!-- Instructions Screen -->
    <div id="instructions-screen" class="screen hidden">
        <div class="bg-white/90 p-8 rounded-3xl shadow-xl text-center max-w-lg w-11/12 animate-pop border-4 border-indigo-300">
            <h2 class="text-3xl font-black text-indigo-500 mb-6">遊戲玩法 🎮</h2>
            <ul class="text-left text-lg font-bold text-gray-700 space-y-4 mb-8">
                <li class="flex items-center gap-3">👆 <span class="flex-1">滑動或移動滑鼠控制籃子。</span></li>
                <li class="flex items-center gap-3">🎁 <span class="flex-1">接住跌落嚟嘅禮物去攞分。</span></li>
                <li class="flex items-center gap-3">💣 <span class="flex-1 text-red-500">避開炸彈呀！會扣分㗎。</span></li>
                <li class="flex items-center gap-3">👂 <span class="flex-1">接到禮物之後，留心聽家長讀音，指出是哪一個字！</span></li>
            </ul>
            <button onclick="startGame()" class="btn bg-green-400 text-white py-4 px-10 rounded-2xl text-2xl font-black border-4 border-white w-full">
                開始遊戲！ 🚀
            </button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="hidden">
        <div id="hud">
            <div class="hud-box">⭐ 分數：<span id="scoreDisplay">0</span></div>
            <div class="hud-box">⏱️ 時間：<span id="timeDisplay">45</span>秒</div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- Question Modal -->
    <div id="question-screen" class="screen hidden" style="background: rgba(0,0,0,0.6);">
        <div class="bg-white p-6 md:p-10 rounded-3xl shadow-2xl text-center max-w-2xl w-11/12 animate-pop border-8 border-yellow-300 relative">
            
            <h2 class="text-3xl font-black text-purple-600 mb-2 mt-4">辨認聲母大挑戰</h2>
            <p class="text-gray-500 font-bold mb-6">留心聽，睇吓係邊個字！</p>
            
            <div class="flex justify-center items-center gap-4 md:gap-12 mb-8 bg-purple-50 p-6 rounded-2xl border-2 border-purple-100">
                <div class="text-5xl md:text-7xl font-black text-blue-500 drop-shadow-md" id="wordA">字 A</div>
                <div class="text-4xl font-black text-gray-300">VS</div>
                <div class="text-5xl md:text-7xl font-black text-rose-500 drop-shadow-md" id="wordB">字 B</div>
            </div>

            <h3 class="text-xl font-bold text-gray-700 mb-4">答案：</h3>
            <div class="flex justify-center gap-4">
                <button onclick="submitAnswer(true)" class="btn flex-1 bg-green-400 hover:bg-green-500 text-white py-4 md:py-6 rounded-2xl text-2xl md:text-3xl font-black border-4 border-white flex items-center justify-center gap-2">
                    ✅ 正確
                </button>
                <button onclick="submitAnswer(false)" class="btn flex-1 bg-red-400 hover:bg-red-500 text-white py-4 md:py-6 rounded-2xl text-2xl md:text-3xl font-black border-4 border-white flex items-center justify-center gap-2">
                    ❌ 錯了
                </button>
            </div>
        </div>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="screen hidden">
        <div class="bg-white/95 p-10 rounded-3xl shadow-2xl text-center max-w-lg w-11/12 animate-pop border-4 border-green-300">
            <div class="text-6xl mb-4">🎉🦄🎉</div>
            <h1 class="text-5xl font-black text-green-500 mb-4">時間到！</h1>
            <p class="text-2xl font-bold text-gray-600 mb-2">完成辨認訓練啦</p>
            
            <div class="bg-green-50 rounded-2xl p-6 my-6 border-2 border-green-100">
                <h2 class="text-xl font-bold text-gray-500">最後總分</h2>
                <div class="text-6xl font-black text-green-600" id="finalScore">0</div>
            </div>

            <button onclick="resetToMenu()" class="btn bg-purple-500 text-white py-4 px-8 rounded-2xl text-2xl font-black border-4 border-white w-full mt-4">
                再玩一次 🔄
            </button>
        </div>
    </div>

    <script>
        // --- DATA ---
        const STIMULI = [
            // Level 1: /k-/ vs. /t-/
            [["家", "（一）打"], ["哥", "多"], ["假", "打"], ["公", "冬"], ["糕", "刀"], ["狗", "豆"], ["驚", "釘"], ["劍", "店"], ["梘", "蛋"], ["鏡", "掟"], ["京", "叮"], ["雞", "低"]],
            // Level 2: /t-/ vs. /th-/
            [["（一）打", "他"], ["多", "拖"], ["冬", "通"], ["刀", "滔"], ["豆", "唞"], ["釘", "聽"], ["擋", "糖"], ["擋", "躺"], ["兜", "偷"], ["底", "睇"], ["袋", "枱"], ["懂", "桶"], ["搭", "塔"], ["當", "湯"]],
            // Level 3: /t-/ vs. Random
            [["多", "波"], ["刀", "煲"], ["的", "逼"], ["電", "便"], ["到", "布"], ["地", "鼻"], ["蛋", "板"], ["單", "班"]]
        ];

        const PRESENTS = ['🎁', '🧸', '🎀', '🍬', '🦄'];
        const BOMBS = ['💣'];

        // --- STATE ---
        let currentLevel = 0;
        let score = 0;
        let isGameRunning = false;
        
        let gameTimeLeft = 45;
        let gameTimerInterval = null;
        
        // Question State
        let currentPair = [];
        let targetWord = "";

        // --- AUDIO SYSTEM (Web Audio API for synthesis, avoiding external assets) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTone(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const SFX = {
            catch: () => { playTone(600, 'sine', 0.1); setTimeout(() => playTone(800, 'sine', 0.15), 50); },
            bomb: () => { playTone(150, 'sawtooth', 0.4, 0.2); setTimeout(() => playTone(100, 'square', 0.3, 0.2), 100); },
            correct: () => { playTone(400, 'triangle', 0.1); setTimeout(() => playTone(600, 'triangle', 0.2), 100); setTimeout(() => playTone(800, 'triangle', 0.3), 200); },
            wrong: () => { playTone(300, 'square', 0.2); setTimeout(() => playTone(250, 'square', 0.3), 150); },
            win: () => { 
                [400, 500, 600, 800, 1000].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.2), i * 100));
            }
        };

        // --- CANVAS ENGINE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let animationId;

        const player = {
            x: 0, y: 0, width: 100, height: 60, emoji: '🧺'
        };

        let entities = [];
        let particles = [];
        let frames = 0;

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            player.y = height - player.height - 30;
            if (player.x === 0) player.x = width / 2 - player.width / 2;
        }
        window.addEventListener('resize', resizeCanvas);

        // Input Handling
        function updatePlayerPos(clientX) {
            player.x = clientX - player.width / 2;
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > width) player.x = width - player.width;
        }

        canvas.addEventListener('mousemove', (e) => updatePlayerPos(e.clientX));
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            updatePlayerPos(e.touches[0].clientX);
        }, { passive: false });

        // Physics & Spawning
        function spawnEntity() {
            if (!isGameRunning) return;
            const isBomb = Math.random() < 0.3; // 30% chance for bomb
            const type = isBomb ? 'bomb' : 'present';
            const char = isBomb ? BOMBS[0] : PRESENTS[Math.floor(Math.random() * PRESENTS.length)];
            const size = 40;
            const x = Math.random() * (width - size*2) + size;
            
            // Gets slightly faster as time goes on
            const speed = 3 + Math.random() * 3 + ((45 - gameTimeLeft) * 0.05); 
            
            entities.push({ x, y: -50, size, char, type, speed });
        }

        function spawnParticles(x, y, isBomb) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color: isBomb ? '#ff4757' : `hsl(${Math.random()*360}, 100%, 70%)`
                });
            }
        }

        function gameLoop() {
            if (!isGameRunning) return;
            
            ctx.clearRect(0, 0, width, height);
            
            // Draw Player
            ctx.font = `${player.height}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText(player.emoji, player.x + player.width/2, player.y);

            // Update & Draw Entities
            for (let i = entities.length - 1; i >= 0; i--) {
                let e = entities[i];
                e.y += e.speed;
                
                // Draw
                ctx.font = `${e.size}px Arial`;
                ctx.fillText(e.char, e.x, e.y);

                // Collision Map
                const hitboxX = player.x - 20;
                const hitboxW = player.width + 40;
                
                if (e.y + e.size > player.y && e.y < player.y + player.height) {
                    if (e.x > hitboxX && e.x < hitboxX + hitboxW) {
                        // Caught!
                        if (e.type === 'present') {
                            SFX.catch();
                            spawnParticles(e.x, e.y, false);
                            triggerQuestion(); // Pause game and show question
                        } else {
                            SFX.bomb();
                            spawnParticles(e.x, e.y, true);
                            score = Math.max(0, score - 50);
                            updateHUD();
                            document.getElementById('game-screen').classList.add('animate-shake');
                            setTimeout(() => document.getElementById('game-screen').classList.remove('animate-shake'), 300);
                        }
                        entities.splice(i, 1);
                        continue;
                    }
                }

                // Off screen
                if (e.y > height + 100) {
                    entities.splice(i, 1);
                }
            }

            // Update & Draw Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 6, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }

            frames++;
            // Spawn rate increases slightly as time goes on
            if (frames % Math.max(30, 80 - Math.floor((45 - gameTimeLeft) / 2)) === 0) {
                spawnEntity();
            }

            animationId = requestAnimationFrame(gameLoop);
        }

        // --- GAME LOGIC ---

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            if(id) document.getElementById(id).classList.remove('hidden');
        }

        function selectLevel(levelIdx) {
            initAudio();
            currentLevel = levelIdx;
            showScreen('instructions-screen');
        }

        function startTimer() {
            clearInterval(gameTimerInterval);
            gameTimerInterval = setInterval(() => {
                gameTimeLeft--;
                updateHUD();
                if (gameTimeLeft <= 0) {
                    clearInterval(gameTimerInterval);
                    endGame();
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(gameTimerInterval);
        }

        function startGame() {
            initAudio();
            score = 0;
            gameTimeLeft = 45;
            entities = [];
            particles = [];
            frames = 0;
            updateHUD();
            showScreen('');
            document.getElementById('game-screen').classList.remove('hidden');
            resizeCanvas();
            isGameRunning = true;
            gameLoop();
            startTimer();
        }

        function triggerQuestion() {
            isGameRunning = false;
            cancelAnimationFrame(animationId);
            stopTimer(); // Pause global game timer
            
            // Prepare Question
            const levelStimuli = STIMULI[currentLevel];
            currentPair = levelStimuli[Math.floor(Math.random() * levelStimuli.length)];
            
            // Randomize target
            targetWord = Math.random() > 0.5 ? currentPair[0] : currentPair[1];
            
            // Randomize left/right display
            const displayPair = Math.random() > 0.5 ? [currentPair[0], currentPair[1]] : [currentPair[1], currentPair[0]];
            
            document.getElementById('wordA').innerText = displayPair[0];
            document.getElementById('wordB').innerText = displayPair[1];
            
            showScreen('question-screen');
        }

        function submitAnswer(isCorrect) {
            if (isCorrect) {
                SFX.correct();
                score += 100;
                
                // Visual feedback checkmark
                const v = document.createElement('div');
                v.innerHTML = '✅';
                v.className = 'absolute text-6xl top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 animate-pop z-50';
                document.body.appendChild(v);
                setTimeout(() => v.remove(), 1000);
            } else {
                SFX.wrong();
                
                const v = document.createElement('div');
                v.innerHTML = '❌';
                v.className = 'absolute text-6xl top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 animate-pop z-50';
                document.body.appendChild(v);
                setTimeout(() => v.remove(), 1000);
            }

            updateHUD();
            showScreen('');

            // Resume Game
            setTimeout(() => {
                if (gameTimeLeft > 0) {
                    isGameRunning = true;
                    startTimer(); // Resume global game timer
                    gameLoop();
                } else {
                    endGame();
                }
            }, 500);
        }

        function updateHUD() {
            document.getElementById('scoreDisplay').innerText = score;
            document.getElementById('timeDisplay').innerText = gameTimeLeft;
        }

        function endGame() {
            isGameRunning = false;
            stopTimer(); // Ensure timer is completely stopped
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('finalScore').innerText = score;
            showScreen('end-screen');
            SFX.win();
            
            // Simple Confetti using DOM
            for(let i=0; i<30; i++) {
                const conf = document.createElement('div');
                conf.innerText = ['🎉', '✨', '🦄', '💖'][Math.floor(Math.random()*4)];
                conf.className = 'absolute text-3xl z-50 pointer-events-none';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-50px';
                conf.style.transition = 'transform 3s cubic-bezier(0.1, 0.8, 0.3, 1), opacity 3s';
                document.body.appendChild(conf);
                
                setTimeout(() => {
                    conf.style.transform = `translate(${Math.random()*200 - 100}px, ${window.innerHeight + 100}px) rotate(${Math.random()*720}deg)`;
                    conf.style.opacity = '0';
                }, 50);
                
                setTimeout(() => conf.remove(), 3000);
            }
        }

        function resetToMenu() {
            showScreen('start-screen');
        }

    </script>
</body>
</html>
